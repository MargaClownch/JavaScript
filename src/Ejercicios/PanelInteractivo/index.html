<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica de Eventos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <h1>Gestor de Eventos JS</h1>

    <section class="card">
        <h2>1. Cuadro de Texto</h2>
        <input type="text" id="nameInput" placeholder="Escribe tu nombre aquí...">
        <p id="typingText" class="feedback-text">Estás escribiendo: </p>
        <p id="keyStatus" class="feedback-text">Pulsa una tecla...</p>
    </section>

    <section class="card">
        <h2>2. Botón</h2>
        <button id="actionBtn">Haz clic aquí</button>
        <p id="btnMessage" class="feedback-text"></p>
    </section>

    <section class="card">
        <h2>3. Cuadro Interactivo</h2>
        <div id="colorBox" class="color-box"></div>
    </section>

    <section class="card">
        <h2>4. Registro de Eventos</h2>
        <ul id="eventLog" class="event-log"></ul>
    </section>
</div>

<script src="script.js" defer></script>
</body>
</html>
